name: Deploy MOTIS UI to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (for patches)
        uses: actions/checkout@v4
        with:
          path: mirror-repo
      - name: Checkout MOTIS source
        uses: actions/checkout@v4
        with:
          repository: motis-project/motis
          sparse-checkout: ui
          path: motis
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false
      - name: Apply patches
        run: |
          cp mirror-repo/patches/layout.ts motis/ui/src/routes/+layout.ts
          sed -i "s|getStyle(theme, level, window.location.origin + window.location.pathname,|getStyle(theme, level, 'https://api.transitous.org/',|g" \
            motis/ui/src/routes/+page.svelte
          sed -i "s|let colorMode = \$state<ColorMode>('stops');|let colorMode = \$state<ColorMode>('mode');|g" \
            motis/ui/src/routes/+page.svelte
          python3 - <<'PYEOF'
          # Force light theme by overriding style.ts dark colors to match light
          # Instead of patching theme detection, we make 'dark' colors = light colors
          s = open('motis/ui/src/lib/map/style.ts').read()

          # Replace the entire dark: { ... } block with a copy of light colors
          # Strategy: find 'dark:' section and replace background with light bg
          # Simpler: replace dark background with a light blue-white
          s = s.replace("background: '#18181b'", "background: '#eef4f8'")
          s = s.replace("background: '#09090b'", "background: '#eef4f8'")
          # Try common dark backgrounds
          for dark_bg in ["'#1a1a2e'", "'#0f0f23'", "'#18181b'", "'#09090b'", "'#111'", "'#0d0d0d'"]:
              s = s.replace(f'background: {dark_bg}', "background: '#eef4f8'")

          # Find dark section and replace its background with light one
          import re
          # Replace dark water
          s = re.sub(r"(dark:[^}]*?water:\s*')[^']*(')", r"\g<1>#4db8e8\2", s, flags=re.DOTALL)
          open('motis/ui/src/lib/map/style.ts', 'w').write(s)

          # Better approach: grep the actual dark background value and patch it
          import subprocess
          result = subprocess.run(['grep', '-n', 'background', 'motis/ui/src/lib/map/style.ts'], capture_output=True, text=True)
          print('Background lines:')
          print(result.stdout)

          # Now force theme = light in page.svelte using line-number insert
          p = open('motis/ui/src/routes/+page.svelte').read()
          # Find the theme line and replace it entirely
          lines = p.split('\n')
          new_lines = []
          for line in lines:
              if "let theme: 'light' | 'dark'" in line:
                  new_lines.append("  let theme: 'light' | 'dark' = 'light';")
                  print(f'Replaced theme line: {line[:80]}')
              else:
                  new_lines.append(line)
          open('motis/ui/src/routes/+page.svelte', 'w').write('\n'.join(new_lines))
          print('Theme forced to light')

          # Inject overlay
          overlay = open('mirror-repo/patches/overlay.html').read()
          app = open('motis/ui/src/app.html').read()
          app = app.replace('</body>', overlay + '</body>')
          open('motis/ui/src/app.html', 'w').write(app)
          print('Overlay injected OK')
          PYEOF
      - name: Install dependencies
        working-directory: motis/ui
        run: pnpm install
      - name: Build all (API client + UI)
        working-directory: motis/ui
        run: pnpm -r build
        env:
          VITE_API_BASE: https://api.transitous.org
          VITE_MOTIS_API: https://api.transitous.org
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: motis/ui/build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
