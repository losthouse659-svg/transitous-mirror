name: Deploy MOTIS UI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MOTIS source
        uses: actions/checkout@v4
        with:
          repository: motis-project/motis
          sparse-checkout: ui

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --unsafe-perm

      - name: Set API endpoint via env
        working-directory: ui
        run: |
          echo 'VITE_API_BASE=https://api.transitous.org' > .env
          echo 'VITE_MOTIS_API=https://api.transitous.org' >> .env
          echo 'PUBLIC_MOTIS_API=https://api.transitous.org' >> .env

      - name: Patch hardcoded localhost URLs in source
        working-directory: ui
        run: |
          find src -type f \( -name '*.ts' -o -name '*.svelte' -o -name '*.js' \) -exec sed -i 's|http://localhost:8080|https://api.transitous.org|g' {} \;
          find src -type f \( -name '*.ts' -o -name '*.svelte' -o -name '*.js' \) -exec sed -i 's|http://localhost|https://api.transitous.org|g' {} \;

      - name: Build
        working-directory: ui
        run: pnpm build
        env:
          VITE_API_BASE: https://api.transitous.org
          VITE_MOTIS_API: https://api.transitous.org

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
