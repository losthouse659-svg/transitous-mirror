name: Deploy MOTIS UI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (for patches)
        uses: actions/checkout@v4
        with:
          path: mirror-repo

      - name: Checkout MOTIS source
        uses: actions/checkout@v4
        with:
          repository: motis-project/motis
          sparse-checkout: ui
          path: motis

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Apply patch - replace +layout.ts with our clean version
        run: |
          cp mirror-repo/patches/layout.ts motis/ui/src/routes/+layout.ts
          echo '--- Applied patch, result:'
          cat motis/ui/src/routes/+layout.ts

      - name: Install dependencies
        working-directory: motis/ui
        run: pnpm install

      - name: Build all (API client + UI)
        working-directory: motis/ui
        run: pnpm -r build
        env:
          VITE_API_BASE: https://api.transitous.org
          VITE_MOTIS_API: https://api.transitous.org

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: motis/ui/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
