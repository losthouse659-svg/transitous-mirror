name: Deploy MOTIS UI to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (for patches)
        uses: actions/checkout@v4
        with:
          path: mirror-repo
      - name: Checkout MOTIS source
        uses: actions/checkout@v4
        with:
          repository: motis-project/motis
          sparse-checkout: ui
          path: motis
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false
      - name: Apply patches
        run: |
          cp mirror-repo/patches/layout.ts motis/ui/src/routes/+layout.ts
          sed -i "s|getStyle(theme, level, window.location.origin + window.location.pathname,|getStyle(theme, level, 'https://api.transitous.org/',|g" \
            motis/ui/src/routes/+page.svelte
          sed -i "s|let colorMode = \$state<ColorMode>('stops');|let colorMode = \$state<ColorMode>('mode');|g" \
            motis/ui/src/routes/+page.svelte
          python3 - <<'PYEOF'
          import re

          # Patch page.svelte: force light theme
          p = open('motis/ui/src/routes/+page.svelte').read()
          # Override theme detection - always use light
          p = re.sub(
            r"let theme: 'light' \| 'dark' = .*?;\n",
            "let theme: 'light' | 'dark' = 'light';\n",
            p, flags=re.DOTALL
          )
          open('motis/ui/src/routes/+page.svelte', 'w').write(p)
          print('Theme patch applied')

          # Patch style.ts: custom vehicle-friendly light colors
          # Change background from beige to a crisp white-blue modern look
          s = open('motis/ui/src/lib/map/style.ts').read()
          s = s.replace("background: '#f8f4f0'", "background: '#eef4f8'")
          s = s.replace("water: '#99ddff'", "water: '#4db8e8'")
          s = s.replace("motorway: '#ffb366'", "motorway: '#e8834a'")
          s = s.replace("primarySecondary: '#fffbf8'", "primarySecondary: '#fff'")
          s = s.replace("building: '#ded7d3'", "building: '#d0cfd4'")
          s = s.replace("landuseNatureLight: '#ddecd7'", "landuseNatureLight: '#c8e6c9'")
          s = s.replace("landusePark: '#b8ebad'", "landusePark: '#a5d6a7'")
          open('motis/ui/src/lib/map/style.ts', 'w').write(s)
          print('Style colors patch applied')

          # Inject overlay
          overlay = open('mirror-repo/patches/overlay.html').read()
          app = open('motis/ui/src/app.html').read()
          app = app.replace('</body>', overlay + '</body>')
          open('motis/ui/src/app.html', 'w').write(app)
          print('Overlay injected OK')
          PYEOF
      - name: Install dependencies
        working-directory: motis/ui
        run: pnpm install
      - name: Build all (API client + UI)
        working-directory: motis/ui
        run: pnpm -r build
        env:
          VITE_API_BASE: https://api.transitous.org
          VITE_MOTIS_API: https://api.transitous.org
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: motis/ui/build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
