<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
/* === GLOBAL FONT & COLOR OVERRIDE === */
body, input, button, select, textarea {
  font-family: 'Inter', system-ui, sans-serif !important;
}

/* === LEFT PANEL === */
[class*="card"], [class*="panel"], [class*="search"],
div[class^="bg-"], div[class*=" bg-"] {
  border-radius: 12px !important;
}

/* Top tab bar (Spoje / Odjezdy / Izochrony) */
nav, [role="tablist"],
div:has(> button[role="tab"]) {
  background: #0d1f1a !important;
  border-bottom: 1px solid #1a4a3a !important;
}
button[role="tab"] {
  font-family: 'Inter', sans-serif !important;
  font-size: 13px !important;
  font-weight: 600 !important;
  color: #7ecfb0 !important;
  text-transform: uppercase !important;
  letter-spacing: .8px !important;
}
button[role="tab"][aria-selected="true"],
button[role="tab"].active {
  color: #2affc4 !important;
  border-bottom: 2px solid #2affc4 !important;
  background: transparent !important;
}

/* Main left sidebar card */
div.absolute.left-2, div.absolute.left-4, div[class*="absolute"][class*="left"] {
  background: rgba(8,22,18,0.96) !important;
  border: 1px solid #1e4d3c !important;
  border-radius: 14px !important;
  box-shadow: 0 4px 24px rgba(0,255,150,0.07) !important;
}

/* Inputs */
input[type="text"], input:not([type]), textarea {
  background: #0a1f18 !important;
  border: 1px solid #1e5040 !important;
  color: #c8ffe8 !important;
  border-radius: 8px !important;
  font-family: 'Inter', sans-serif !important;
}
input::placeholder {
  color: #3a7060 !important;
}

/* Primary buttons (Odjezd/Prijezd) */
button[class*="bg-"] {
  font-family: 'Inter', sans-serif !important;
  font-weight: 600 !important;
  border-radius: 8px !important;
}

/* Active blue button -> teal */
button.bg-blue-600, button[class*="bg-blue"] {
  background: #0e7f5a !important;
  border-color: #0e7f5a !important;
}
button.bg-blue-600:hover, button[class*="bg-blue"]:hover {
  background: #12a876 !important;
}

/* Top-right dropdown (Timetable) */
button[class*="dropdown"], select,
div[class*="absolute"][class*="right"] > button:first-child {
  background: #0d1f1a !important;
  border: 1px solid #1e4d3c !important;
  color: #7ecfb0 !important;
  border-radius: 10px !important;
  font-family: 'Inter', sans-serif !important;
}

/* Map attribution strip */
.maplibregl-ctrl-attrib {
  background: rgba(5,15,12,0.85) !important;
  color: #3a7060 !important;
  font-size: 10px !important;
  border-radius: 4px 0 0 0 !important;
}
.maplibregl-ctrl-attrib a { color: #2affc4 !important; }

/* Scale bar */
.maplibregl-ctrl-scale {
  background: rgba(5,15,12,0.8) !important;
  border-color: #2affc4 !important;
  color: #2affc4 !important;
  font-size: 10px !important;
}

/* Scrollbars */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #0a1a14; }
::-webkit-scrollbar-thumb { background: #1e5040; border-radius: 3px; }

/* Title override in browser tab */
</style>

<!-- Custom title -->
<script>document.title = 'TrackMap – Live Transit';</script>

<!-- Custom logo injected into top-left -->
<div id="tm-logo" style="
  position:fixed;top:0;left:0;right:0;height:0;z-index:10000;pointer-events:none;
">
  <div style="
    position:absolute;top:6px;left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,#0a2a1e,#0d3326);
    border:1px solid #1e5a40;border-radius:20px;
    padding:3px 14px;pointer-events:none;
    font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
    color:#2affc4;letter-spacing:1.5px;text-transform:uppercase;
    box-shadow:0 0 12px rgba(42,255,196,0.15);
  ">TrackMap</div>
</div>

<!-- Bottom-right overlay panel -->
<style>
#mv-panel{position:fixed;bottom:20px;right:16px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:6px;font-family:'Inter',sans-serif}
#mv-legend{background:rgba(8,22,18,0.97);color:#c8ffe8;border:1px solid #1e5040;border-radius:12px;padding:10px 14px;font-size:12px;display:none;min-width:165px;box-shadow:0 4px 20px rgba(0,255,150,0.1)}
#mv-legend.open{display:block}
#mv-legend h4{margin:0 0 8px;font-size:11px;color:#2affc4;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.mv-row{display:flex;align-items:center;gap:8px;margin:3px 0;color:#a0dfc0}
.mv-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 4px currentColor}
#mv-btns{display:flex;gap:6px}
#mv-btns button{background:rgba(8,22,18,0.95);color:#2affc4;border:1px solid #1e5040;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;font-weight:600;box-shadow:0 2px 8px rgba(0,255,150,0.1);transition:all .15s;letter-spacing:.3px}
#mv-btns button:hover{background:#0e3d2a;border-color:#2affc4;box-shadow:0 0 10px rgba(42,255,196,0.2)}
#mv-orig{text-decoration:none;display:block;text-align:center;font-size:10px;color:#3a7060;font-family:'Inter',sans-serif;letter-spacing:.5px;transition:color .15s}
#mv-orig:hover{color:#2affc4}
#mv-clock{background:rgba(8,22,18,0.95);color:#2affc4;border:1px solid #1e5040;border-radius:8px;padding:5px 12px;font-size:13px;font-family:'Courier New',monospace;text-align:center;letter-spacing:2px;box-shadow:0 0 8px rgba(42,255,196,0.1)}
</style>
<div id="mv-panel">
  <div id="mv-legend">
    <h4>Barvy vozidel</h4>
    <div class="mv-row"><div class="mv-dot" style="background:#a8e063"></div>Autobus</div>
    <div class="mv-row"><div class="mv-dot" style="background:#e05c5c"></div>Vlak (regionalni)</div>
    <div class="mv-row"><div class="mv-dot" style="background:#f8c56c"></div>Rychlovlak / EC / IC</div>
    <div class="mv-row"><div class="mv-dot" style="background:#b06cf8"></div>Metro / tramvaj</div>
    <div class="mv-row"><div class="mv-dot" style="background:#5b8cff"></div>Trajekt / lod</div>
    <div class="mv-row"><div class="mv-dot" style="background:#888"></div>Ostatni</div>
  </div>
  <div id="mv-clock">--:--:--</div>
  <div id="mv-btns">
    <button onclick="document.getElementById('mv-legend').classList.toggle('open')">Legenda</button>
    <button onclick="(function(){var m=window.maplibregl||window.__map;if(m&&m.flyTo){m.flyTo({center:[16.6068,49.1951],zoom:12})}else{window.location.href=window.location.pathname+'?lat=49.1951&lng=16.6068&zoom=12';}})()">📍 Brno</button>
  </div>
  <a id="mv-orig" href="https://api.transitous.org" target="_blank">zdroj dat: api.transitous.org</a>
</div>
<script>
(function(){
  var c=document.getElementById('mv-clock');
  function tick(){var d=new Date();if(c)c.textContent=[d.getHours(),d.getMinutes(),d.getSeconds()].map(function(n){return String(n).padStart(2,'0');}).join(':');}
  tick();setInterval(tick,1000);
})();
</script>
