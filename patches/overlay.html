<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
/* === THEME VARIABLES === */
:root {
  --bg-main: rgba(8,22,18,0.96);
  --bg-panel: #0d1f1a;
  --bg-input: #0a1f18;
  --border: #1e4d3c;
  --border-strong: #1e5040;
  --text-main: #c8ffe8;
  --text-muted: #7ecfb0;
  --text-dim: #3a7060;
  --accent: #2affc4;
  --shadow: rgba(0,255,150,0.07);
}

/* === GLOBAL FONT === */
body, input, button, select, textarea {
  font-family: 'Inter', system-ui, sans-serif !important;
}

/* === LEFT PANEL === */
[class*="card"], [class*="panel"], [class*="search"],
div[class^="bg-"], div[class*=" bg-"] {
  border-radius: 12px !important;
}

nav, [role="tablist"],
div:has(> button[role="tab"]) {
  background: var(--bg-panel) !important;
  border-bottom: 1px solid var(--border) !important;
}
button[role="tab"] {
  font-family: 'Inter', sans-serif !important;
  font-size: 13px !important;
  font-weight: 600 !important;
  color: var(--text-muted) !important;
  text-transform: uppercase !important;
  letter-spacing: .8px !important;
}
button[role="tab"][aria-selected="true"],
button[role="tab"].active {
  color: var(--accent) !important;
  border-bottom: 2px solid var(--accent) !important;
  background: transparent !important;
}

div.absolute.left-2, div.absolute.left-4, div[class*="absolute"][class*="left"] {
  background: var(--bg-main) !important;
  border: 1px solid var(--border) !important;
  border-radius: 14px !important;
  box-shadow: 0 4px 24px var(--shadow) !important;
}

input[type="text"], input:not([type]), textarea {
  background: var(--bg-input) !important;
  border: 1px solid var(--border-strong) !important;
  color: var(--text-main) !important;
  border-radius: 8px !important;
  font-family: 'Inter', sans-serif !important;
}
input::placeholder { color: var(--text-dim) !important; }

button[class*="bg-"] {
  font-family: 'Inter', sans-serif !important;
  font-weight: 600 !important;
  border-radius: 8px !important;
}
button.bg-blue-600, button[class*="bg-blue"] {
  background: var(--accent) !important;
  border-color: var(--accent) !important;
}

button[class*="dropdown"], select, div[class*="absolute"][class*="right"] > button:first-child {
  background: var(--bg-panel) !important;
  border: 1px solid var(--border) !important;
  color: var(--text-muted) !important;
  border-radius: 10px !important;
  font-family: 'Inter', sans-serif !important;
}

.maplibregl-ctrl-attrib {
  background: var(--bg-main) !important;
  color: var(--text-dim) !important;
  font-size: 10px !important;
  border-radius: 4px 0 0 0 !important;
}
.maplibregl-ctrl-attrib a { color: var(--accent) !important; }
.maplibregl-ctrl-scale {
  background: var(--bg-main) !important;
  border-color: var(--accent) !important;
  color: var(--accent) !important;
  font-size: 10px !important;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg-input); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* dark map overlay filter when active */
body.tm-darkmap .maplibregl-canvas {
  filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.1) !important;
}

/* === PANEL === */
#mv-panel{position:fixed;bottom:20px;right:16px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:6px;font-family:'Inter',sans-serif}
#mv-legend{background:var(--bg-main);color:var(--text-main);border:1px solid var(--border-strong);border-radius:12px;padding:10px 14px;font-size:12px;display:none;min-width:175px;box-shadow:0 4px 20px var(--shadow)}
#mv-legend.open{display:block}
#mv-legend h4{margin:0 0 8px;font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.mv-row{display:flex;align-items:center;gap:8px;margin:3px 0;color:var(--text-muted)}
.mv-arrow{width:14px;height:14px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
.mv-arrow svg{width:14px;height:14px;}
#mv-btns{display:flex;gap:6px}
#mv-btns button{background:var(--bg-main);color:var(--accent);border:1px solid var(--border-strong);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;font-weight:600;box-shadow:0 2px 8px var(--shadow);transition:all .2s;letter-spacing:.3px}
#mv-btns button:hover{background:var(--bg-panel);border-color:var(--accent)}
#mv-orig{text-decoration:none;display:block;text-align:center;font-size:10px;color:var(--text-dim);font-family:'Inter',sans-serif;letter-spacing:.5px;transition:color .15s}
#mv-orig:hover{color:var(--accent)}
#mv-clock{background:var(--bg-main);color:var(--accent);border:1px solid var(--border-strong);border-radius:8px;padding:5px 12px;font-size:13px;font-family:'Courier New',monospace;text-align:center;letter-spacing:2px;box-shadow:0 0 8px var(--shadow)}
#mv-theme{background:rgba(8,22,18,0.95);color:#2affc4;border:1px solid #1e5040;border-radius:8px;padding:5px 11px;font-size:16px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,255,150,0.1)}
#mv-theme:hover{border-color:#2affc4;background:#0e3d2a;box-shadow:0 0 12px rgba(42,255,196,0.25)}
#mv-theme.active{background:#0a0a0a;color:#60a5fa;border-color:#3b82f6;box-shadow:0 0 14px rgba(59,130,246,0.3)}
</style>

<div id="mv-panel">
  <div id="mv-legend">
    <h4>Barvy vozidel</h4>
    <div class="mv-row"><span class="mv-arrow"><svg viewBox="0 0 14 18" fill="#3b82f6"><polygon points="7,0 14,18 7,13 0,18"/></svg></span>Autobus</div>
    <div class="mv-row"><span class="mv-arrow"><svg viewBox="0 0 14 18" fill="#22c55e"><polygon points="7,0 14,18 7,13 0,18"/></svg></span>Vlak (regionální)</div>
    <div class="mv-row"><span class="mv-arrow"><svg viewBox="0 0 14 18" fill="#f59e0b"><polygon points="7,0 14,18 7,13 0,18"/></svg></span>Rychlovlak / EC / IC</div>
    <div class="mv-row"><span class="mv-arrow"><svg viewBox="0 0 14 18" fill="#a855f7"><polygon points="7,0 14,18 7,13 0,18"/></svg></span>Metro / tramvaj</div>
    <div class="mv-row"><span class="mv-arrow"><svg viewBox="0 0 14 18" fill="#06b6d4"><polygon points="7,0 14,18 7,13 0,18"/></svg></span>Trajekt / loď</div>
    <div class="mv-row"><span class="mv-arrow"><svg viewBox="0 0 14 18" fill="#6b7280"><polygon points="7,0 14,18 7,13 0,18"/></svg></span>Ostatní</div>
  </div>
  <div id="mv-btns">
    <button id="mv-theme" title="Dark mapa">&#9790;</button>
    <button onclick="document.getElementById('mv-legend').classList.toggle('open')">Legenda &#128205; Brno</button>
  </div>
  <div id="mv-clock">--:--:--</div>
  <a id="mv-orig" href="https://api.transitous.org" target="_blank">zdroj dat: api.transitous.org</a>
</div>

<script>
(function(){
  // Clock
  var c = document.getElementById('mv-clock');
  function tick(){
    var d = new Date();
    if(c) c.textContent = [d.getHours(),d.getMinutes(),d.getSeconds()].map(function(n){return String(n).padStart(2,'0');}).join(':');
  }
  tick(); setInterval(tick, 1000);

  // Dark map toggle via CSS filter on canvas
  var themeBtn = document.getElementById('mv-theme');
  var darkMap = false;

  themeBtn.addEventListener('click', function(){
    darkMap = !darkMap;
    if(darkMap){
      document.body.classList.add('tm-darkmap');
      themeBtn.classList.add('active');
      themeBtn.title = 'Zpět na světlou mapu';
      themeBtn.textContent = '\u2600\uFE0F';
    } else {
      document.body.classList.remove('tm-darkmap');
      themeBtn.classList.remove('active');
      themeBtn.title = 'Dark mapa';
      themeBtn.textContent = '\u263E';
    }
  });

  // Marker patch
  function patchMarkers(){
    if(window.maplibregl && window.maplibregl.Marker){
      var OrigMarker = window.maplibregl.Marker;
      if(OrigMarker._patched) return;
      var PatchedMarker = function(options){
        options = options || {};
        if(!options.element){
          var color = options.color || '#3b82f6';
          var el = document.createElement('div');
          el.style.cssText = 'cursor:pointer;position:relative;';
          el.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="20" viewBox="0 0 14 18" style="filter:drop-shadow(0 1px 4px rgba(0,0,0,0.6))"><polygon points="7,0 14,18 7,13 0,18" fill="'+color+'"/></svg>';
          options.element = el;
        }
        return new OrigMarker(options);
      };
      PatchedMarker.prototype = OrigMarker.prototype;
      PatchedMarker._patched = true;
      window.maplibregl.Marker = PatchedMarker;
    }
  }
  patchMarkers();
  setTimeout(patchMarkers, 1000);
  setTimeout(patchMarkers, 3000);
})();
</script>
